<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Code Snippet Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-lg">
        <h1 class="text-3xl font-bold mb-4 text-center">Code Snippet AI</h1>
        <p class="mb-6 text-gray-600 text-center">Generate code instantly with natural language.</p>
        <form id="snippetForm" class="space-y-4">
            <div>
                <label for="prompt" class="block text-sm font-medium text-gray-700">What code do you need?</label>
                <textarea id="prompt" rows="4" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="e.g., 'Python function to reverse a string', 'React button component'"></textarea>
            </div>
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Generate Snippet
            </button>
        </form>
        <div id="result" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-md hidden">
            <h2 class="text-lg font-semibold mb-2">Generated Code:</h2>
            <pre class="whitespace-pre-wrap text-sm text-gray-800" id="codeOutput"></pre>
        </div>
        <p class="mt-6 text-sm text-center text-gray-500">Powered by Apex.</p>
    </div>

    <script>
        const form = document.getElementById('snippetForm');
        const promptInput = document.getElementById('prompt');
        const resultDiv = document.getElementById('result');
        const codeOutput = document.getElementById('codeOutput');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const promptText = promptInput.value;
            // In a real app, this would call your backend API.
            // For this demo, we'll simulate a response.
            resultDiv.classList.add('hidden');
            codeOutput.textContent = 'Generating...';

            await new Promise(resolve => setTimeout(resolve, 1500)); // Simulate API call

            const simulatedCode = `// Example generated code for: "${promptText}"\n\nfunction exampleSnippet() {\n  console.log('Hello from generated code!');\n  // Your AI-generated code would go here\n}\n`;
            
            codeOutput.textContent = simulatedCode;
            resultDiv.classList.remove('hidden');
        });
    </script>
</body>
</html>
